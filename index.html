<html lang="en">
<head>
  <meta charset="UTF-8">

<div class="container py-5">
  <div class="card shadow-sm">
    <div class="card-body">
      <div class="d-flex justify-content-between align-items-center mb-4">

        <div class="d-flex align-items-center gap-3">
          <span class="text-muted small">Hi, <span id="userLabel"></span></span>

          <button id="tableViewBtn" type="button" class="btn btn-outline-primary active" onclick="setView('table')">Table</button>
          <button id="cardViewBtn" type="button" class="btn btn-outline-primary" onclick="setView('cards')">Cards</button>
        </div>

            </tr>
          </thead>

        </table>
      </div>
      <div id="cardView" class="row g-3 d-none"></div>
      <div id="empty" class="text-center text-muted py-3 d-none">No pets added yet.</div>
    </div>
  </div>
</div>
<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"></script>
<script src="scripts/api.js"></script>
<script src="scripts/index.js"></script>
</body>
</html>
