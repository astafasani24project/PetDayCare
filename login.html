<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Login - Pet Manager</title>
  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
  <link rel="stylesheet" href="styles/style.css">
</head>
<body>
<div class="container py-5">
  <div class="card shadow-sm mx-auto" style="max-width:420px">
    <div class="card-body">
      <div class="text-center mb-4">
        <h1 class="h3 mb-2">🐾 Pet Manager</h1>
        <p class="text-muted mb-0" id="subtitle">Please log in to continue</p>
      </div>

      <ul class="nav nav-pills nav-fill mb-4">
        <li class="nav-item">
          <button class="nav-link active" id="loginTab" type="button" onclick="switchTab('login')">Login</button>
        </li>
        <li class="nav-item">
          <button class="nav-link" id="registerTab" type="button" onclick="switchTab('register')">Register</button>
        </li>
      </ul>

      <form onsubmit="submitForm(event)">
        <div class="mb-3">
          <label class="form-label">Username</label>
          <input id="username" class="form-control" placeholder="Username" required>
        </div>
        <div class="mb-4">
          <label class="form-label">Password</label>
          <input id="password" type="password" class="form-control" placeholder="Password" required>
        </div>
        <div id="errorMsg" class="alert alert-danger py-2 d-none"></div>
        <button class="btn btn-primary w-100" type="submit" id="submitBtn">Login</button>
      </form>

      <p class="text-muted small text-center mt-3 mb-0">
        Admin account: <b>admin</b> / <b>1234</b>
      </p>
      <p class="text-center mt-3 mb-0">
        <a href="welcome.html" class="small text-decoration-none">← Back to welcome</a>
      </p>
    </div>
  </div>
</div>
<script src="scripts/api.js"></script>
<script src="scripts/login.js"></script>
</body>
</html>
