<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Add Pet</title>
  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
  <link rel="stylesheet" href="styles/style.css">
</head>
<body>
<div class="container py-5">
  <div class="card shadow-sm mx-auto" style="max-width:480px">
    <div class="card-body">
      <h1 class="h4 mb-4">Add Pet</h1>
      <form onsubmit="addPet(event)">
        <div class="mb-3">
          <label class="form-label">Pet Name</label>
          <input id="petName" class="form-control" placeholder="Pet Name" required>
        </div>
        <div class="mb-3">
          <label class="form-label">Type</label>
          <input type="hidden" id="type" required>
          <div class="pet-select" id="typeDropdown">
            <div class="pet-select-trigger" onclick="toggleDropdown()">
              <span id="typeLabel" class="text-muted">Select Type</span>
              <span>&#9660;</span>
            </div>
            <div class="pet-select-options" id="typeOptions">
              <div class="pet-select-option" onclick="selectType('Dog', this)"><img src="images/dog.png" width="22" height="22" alt="Dog"> Dog</div>
              <div class="pet-select-option" onclick="selectType('Cat', this)"><img src="images/cat.png" width="22" height="22" alt="Cat"> Cat</div>
              <div class="pet-select-option" onclick="selectType('Bird', this)"><img src="images/bird.png" width="22" height="22" alt="Bird"> Bird</div>
              <div class="pet-select-option" onclick="selectType('Fish', this)"><img src="images/fish.png" width="22" height="22" alt="Fish"> Fish</div>
              <div class="pet-select-option" onclick="selectType('Rabbit', this)"><img src="images/rabbit.png" width="22" height="22" alt="Rabbit"> Rabbit</div>
              <div class="pet-select-option" onclick="selectType('Hamster', this)"><img src="images/hamster.png" width="22" height="22" alt="Hamster"> Hamster</div>
              <div class="pet-select-option" onclick="selectType('Turtle', this)"><img src="images/turtle.png" width="22" height="22" alt="Turtle"> Turtle</div>
            </div>
          </div>
        </div>
        <div class="mb-4" id="ownerField">
          <label class="form-label">Owner</label>
          <input id="owner" class="form-control" placeholder="Owner" required>
        </div>
        <div class="d-flex gap-2">
          <button class="btn btn-primary" type="submit">Save</button>
          <a href="index.html" class="btn btn-secondary">Cancel</a>
        </div>
      </form>
    </div>
  </div>
</div>
<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"></script>
<script>
function toggleDropdown() {
  document.getElementById('typeOptions').classList.toggle('open');
}
function selectType(value, el) {
  document.getElementById('type').value = value;
  const label = document.getElementById('typeLabel');
  label.innerHTML = el.innerHTML;
  label.classList.remove('text-muted');
  document.getElementById('typeOptions').classList.remove('open');
}
document.addEventListener('click', function(e) {
  if (!document.getElementById('typeDropdown').contains(e.target)) {
    document.getElementById('typeOptions').classList.remove('open');
  }
});
</script>
<script src="scripts/api.js"></script>
<script src="scripts/add-pet.js"></script>
</body>
</html>
